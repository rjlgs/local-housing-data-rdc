name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths: ['dashboard/**', 'scripts/**', 'config.json', 'index.html']

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Cache pip dependencies
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      # Restore cached data from main branch builds
      - uses: actions/cache/restore@v4
        with:
          path: data
          key: pipeline-data-${{ hashFiles('config.json') }}
          restore-keys: pipeline-data-

      # Install dependencies (minimal - just for build script)
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Build dashboard data (uses cached data, no API calls)
      - name: Build dashboard data
        run: |
          if [ -f data/dashboard_data.json ]; then
            echo "Using cached dashboard data"
          else
            echo "No cached data - building minimal dataset"
            python3 scripts/build_dashboard_data.py || true
          fi

      # Generate status page
      - name: Generate status page
        run: python3 scripts/generate_status_page.py || true

      # Assemble preview site
      - name: Assemble site
        run: |
          mkdir -p _site/dashboard _site/data
          cp index.html _site/
          cp config.json _site/
          cp -r dashboard/* _site/dashboard/
          [ -f data/dashboard_data.json ] && cp data/dashboard_data.json _site/data/ || echo '{}' > _site/data/dashboard_data.json
          [ -f data/status.html ] && cp data/status.html _site/
          [ -f data/zcta_boundaries.geojson ] && cp data/zcta_boundaries.geojson _site/data/ || true

      # Deploy to surge.sh
      - name: Deploy preview
        id: deploy
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          if [ -z "$SURGE_TOKEN" ]; then
            echo "SURGE_TOKEN not set - skipping deployment"
            echo "url=" >> $GITHUB_OUTPUT
            exit 0
          fi
          npm install -g surge
          PREVIEW_URL="pr-${{ github.event.pull_request.number }}-housing-dashboard.surge.sh"
          surge _site $PREVIEW_URL --token $SURGE_TOKEN
          echo "url=https://$PREVIEW_URL" >> $GITHUB_OUTPUT

      # Comment on PR with preview URL
      - name: Comment preview URL
        if: steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const body = `## 🚀 Preview Deployment

            Your changes have been deployed to a preview environment:

            **Preview URL:** ${url}/dashboard/

            > This preview will be updated on each push to this PR.`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Deployment')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      # Fallback: Upload as artifact if no surge token
      - name: Upload preview artifact
        if: steps.deploy.outputs.url == ''
        uses: actions/upload-artifact@v4
        with:
          name: preview-pr-${{ github.event.pull_request.number }}
          path: _site
          retention-days: 7

      - name: Comment artifact info
        if: steps.deploy.outputs.url == ''
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 📦 Preview Build Complete

            Preview deployment is not configured (missing \`SURGE_TOKEN\` secret).

            You can download the build artifact from the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) to preview locally.

            To enable automatic preview deployments:
            1. Install surge: \`npm install -g surge\`
            2. Get a token: \`surge token\`
            3. Add \`SURGE_TOKEN\` to repository secrets`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Build')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
